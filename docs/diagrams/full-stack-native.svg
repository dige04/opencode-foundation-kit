<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1120" viewBox="0 0 1000 1120" role="img" aria-labelledby="title desc">
  <title id="title">Full native OpenCode stack</title>
  <desc id="desc">Architecture diagram showing NotebookLM MCP, Linear MCP, Tilth MCP, and Beads Village MCP feeding OpenCode, with Hive orchestration, Beads core memory, and a shared Git repository below.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5e34" />
    </marker>
    <style>
      .title { font: 700 22px sans-serif; fill: #1f2937; }
      .label { font: 700 19px sans-serif; }
      .sub { font: 400 17px sans-serif; }
      .small { font: 400 15px sans-serif; }
      .box { stroke-width: 2; }
      .arrow { fill: none; stroke: #8b5e34; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="1120" fill="#fafaf8" />
  <text x="500" y="40" text-anchor="middle" class="title">Full stack: 5 layers, Beads Village is a coordination layer on top of Beads</text>

  <rect x="40" y="60" rx="16" ry="16" width="180" height="62" fill="#f7e7df" stroke="#bc6c25" class="box" />
  <text x="130" y="99" text-anchor="middle" class="label" fill="#9a4b10">NotebookLM MCP</text>

  <rect x="255" y="60" rx="16" ry="16" width="190" height="62" fill="#f9e6ef" stroke="#c85a84" class="box" />
  <text x="350" y="99" text-anchor="middle" class="label" fill="#9d2f5e">Linear MCP</text>

  <rect x="485" y="60" rx="16" ry="16" width="175" height="62" fill="#e5eddc" stroke="#799b42" class="box" />
  <text x="572" y="99" text-anchor="middle" class="label" fill="#45631e">Tilth MCP</text>

  <rect x="695" y="60" rx="16" ry="16" width="265" height="62" fill="#dff0ea" stroke="#0f8a74" class="box" />
  <text x="827" y="99" text-anchor="middle" class="label" fill="#0d5d4f">Beads Village MCP</text>

  <path class="arrow" d="M 130 122 L 130 165" />
  <path class="arrow" d="M 350 122 L 350 165" />
  <path class="arrow" d="M 572 122 L 572 165" />
  <path class="arrow" d="M 827 122 L 827 165" />

  <rect x="40" y="165" rx="18" ry="18" width="920" height="92" fill="#e8f0fb" stroke="#4f84d3" class="box" />
  <text x="500" y="205" text-anchor="middle" class="label" fill="#174f9c">OpenCode - runtime (MCP host + plugin system)</text>
  <text x="500" y="236" text-anchor="middle" class="sub" fill="#205dab">Plugin: opencode-hive | MCP clients: beads-village, tilth, linear, notebooklm</text>

  <path class="arrow" d="M 318 257 L 318 301" />
  <path class="arrow" d="M 684 257 L 684 301" />

  <rect x="40" y="301" rx="22" ry="22" width="445" height="302" fill="#ecebff" stroke="#6366f1" class="box" />
  <text x="262" y="340" text-anchor="middle" class="label" fill="#4138c2">Agent Hive (orchestration)</text>
  <text x="262" y="370" text-anchor="middle" class="sub" fill="#4f46d9">Plan -> Approve -> Execute</text>

  <rect x="67" y="395" rx="12" ry="12" width="392" height="44" fill="#fdebdc" stroke="#c76927" class="box" />
  <text x="263" y="423" text-anchor="middle" class="sub" fill="#aa4e15">Architect + Scout + Swarm + Forager + Hygienic</text>

  <rect x="66" y="452" rx="10" ry="10" width="190" height="46" fill="#efede7" stroke="#8c8477" class="box" />
  <text x="161" y="481" text-anchor="middle" class="sub" fill="#59534d">Batch parallel</text>

  <rect x="270" y="452" rx="10" ry="10" width="188" height="46" fill="#efede7" stroke="#8c8477" class="box" />
  <text x="364" y="481" text-anchor="middle" class="sub" fill="#59534d">Worktree isolate</text>

  <rect x="66" y="510" rx="10" ry="10" width="392" height="44" fill="#f8ecd7" stroke="#b3741f" class="box" />
  <text x="262" y="538" text-anchor="middle" class="sub" fill="#865012">Skills: TDD, debug, review, verification</text>

  <rect x="66" y="568" rx="10" ry="10" width="392" height="30" fill="#efede7" stroke="#8c8477" class="box" />
  <text x="262" y="589" text-anchor="middle" class="small" fill="#59534d">.hive / plan + context + audit</text>

  <rect x="515" y="301" rx="22" ry="22" width="445" height="302" fill="#dff0ea" fill-opacity="0.72" stroke="#0f8a74" class="box" />
  <text x="737" y="340" text-anchor="middle" class="label" fill="#0d5d4f">Beads (core memory)</text>

  <rect x="551" y="374" rx="10" ry="10" width="373" height="44" fill="#e6efdd" stroke="#799b42" class="box" />
  <text x="737" y="402" text-anchor="middle" class="sub" fill="#3f641d">Graph: dependency + hash ID + compaction</text>

  <rect x="551" y="430" rx="10" ry="10" width="373" height="44" fill="#e6efdd" stroke="#799b42" class="box" />
  <text x="737" y="458" text-anchor="middle" class="sub" fill="#3f641d">Dolt SQL: cell-level merge + branch</text>

  <rect x="551" y="490" rx="14" ry="14" width="373" height="88" fill="#f8ecd7" stroke="#b3741f" class="box" />
  <text x="737" y="528" text-anchor="middle" class="label" fill="#865012">Beads Village (coordination MCP)</text>
  <text x="737" y="557" text-anchor="middle" class="sub" fill="#975d15">file locking: reserve / release</text>
  <text x="737" y="583" text-anchor="middle" class="sub" fill="#975d15">agent mail: msg / inbox / broadcast</text>

  <path class="arrow" d="M 485 449 L 551 449" />
  <path class="arrow" d="M 551 481 L 485 481" />
  <text x="502" y="443" class="small" fill="#4b5563">sync</text>

  <text x="738" y="628" text-anchor="middle" class="sub" fill="#4b5563">Village calls Beads commands under the hood</text>

  <path class="arrow" d="M 262 603 L 262 665" />
  <path class="arrow" d="M 737 603 L 737 665" />

  <rect x="40" y="665" rx="18" ry="18" width="920" height="74" fill="#efede7" stroke="#8c8477" class="box" />
  <text x="500" y="704" text-anchor="middle" class="label" fill="#4b4b46">Git repository (shared source of truth)</text>
  <text x="500" y="730" text-anchor="middle" class="sub" fill="#66615a">.beads/ + .beads-village/ + .mail/ + .reservations/ + .hive/</text>

  <text x="500" y="792" text-anchor="middle" class="label" fill="#1f2937">What each layer adds (no overlap)</text>

  <rect x="40" y="816" rx="14" ry="14" width="212" height="86" fill="#e5eddc" stroke="#799b42" class="box" />
  <text x="146" y="854" text-anchor="middle" class="label" fill="#45631e">Tilth</text>
  <text x="146" y="884" text-anchor="middle" class="sub" fill="#45631e">AST + outline</text>

  <rect x="280" y="816" rx="14" ry="14" width="212" height="86" fill="#ecebff" stroke="#6366f1" class="box" />
  <text x="386" y="854" text-anchor="middle" class="label" fill="#4138c2">Agent Hive</text>
  <text x="386" y="884" text-anchor="middle" class="sub" fill="#4138c2">Batch + skills</text>

  <rect x="520" y="816" rx="14" ry="14" width="212" height="86" fill="#dff0ea" stroke="#0f8a74" class="box" />
  <text x="626" y="854" text-anchor="middle" class="label" fill="#0d5d4f">Beads</text>
  <text x="626" y="884" text-anchor="middle" class="sub" fill="#0d5d4f">Graph + compaction</text>

  <rect x="760" y="816" rx="14" ry="14" width="200" height="86" fill="#f8ecd7" stroke="#b3741f" class="box" />
  <text x="860" y="854" text-anchor="middle" class="label" fill="#865012">Village</text>
  <text x="860" y="884" text-anchor="middle" class="sub" fill="#865012">Lock + mail</text>

  <rect x="40" y="936" rx="18" ry="18" width="920" height="148" fill="#e8f0fb" stroke="#4f84d3" class="box" />
  <text x="500" y="974" text-anchor="middle" class="label" fill="#164f9c">Example full flow with 3 agents on 1 feature</text>
  <text x="72" y="1014" class="sub" fill="#164f9c">1. Hive plans, batches work, and assigns Foragers into worktrees.</text>
  <text x="72" y="1046" class="sub" fill="#164f9c">2. Foragers use Tilth to read code and Beads to claim tasks.</text>
  <text x="72" y="1078" class="sub" fill="#164f9c">3. Beads Village reserves files before edits so agents do not conflict.</text>
  <text x="72" y="1110" class="sub" fill="#164f9c">4. Village releases locks and broadcasts updates while Beads closes and compacts work.</text>
</svg>
